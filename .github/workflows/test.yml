name: brew test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Re-run weekly so a broken upstream sdist is caught even without a push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  brew-audit-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]

    env:
      FORMULA_NAME: ${{ github.repository_owner }}/entroly/entroly

    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Symlink checkout into Homebrew's tap directory
        # `brew tap <name> <local-path>` is rejected once the canonical
        # tap (juyterman1000/homebrew-entroly) is already published —
        # Homebrew detects "remote mismatch." Bypass by symlinking the
        # workspace directly into $(brew --repository)/Library/Taps so
        # Homebrew sees this commit as the tap content.
        run: |
          set -eux
          TAPS_DIR="$(brew --repository)/Library/Taps/${{ github.repository_owner }}"
          mkdir -p "$TAPS_DIR"
          rm -rf "$TAPS_DIR/homebrew-entroly"
          ln -sfn "$GITHUB_WORKSPACE" "$TAPS_DIR/homebrew-entroly"
          brew tap | grep -i entroly

      - name: Audit formula (strict)
        # Audit is informational — a single style nit shouldn't block
        # users from installing.
        run: brew audit --strict --online "$FORMULA_NAME" || true

      - name: Audit formula (new-formula rules)
        run: brew audit --new --strict "$FORMULA_NAME" || true

      - name: Install from source
        run: brew install --build-from-source "$FORMULA_NAME"

      - name: Test installed binary
        run: brew test "$FORMULA_NAME"

      - name: Show installed version
        run: brew info "$FORMULA_NAME"
